name: AQI Daily Fetch

on:
  schedule:
    - cron: '30 10 * * *'   # 4 PM IST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install pandas requests

      - name: Run script
        run: python fetch.py

      - name: Commit updated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add aqi_history.csv
          git commit -m "Update AQI data" || echo "No changes"
          git push
