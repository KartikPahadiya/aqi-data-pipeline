name: AQI Pipeline

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas numpy torch scikit-learn requests joblib matplotlib

      - run: python fetch.py
      - run: python train_model.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add aqi_history.csv pollution_stgcn_model.pth scaler.pkl
          git commit -m "Update data + model" || echo "No changes"
          git push
